<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Inventory - Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        .header { background-color: #2c3e50; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-size: 20px; }
        .logout-btn { background-color: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .logout-btn:hover { background-color: #c0392b; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .welcome-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Grid for menu options */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .menu-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #ddd; }
        .menu-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); border-color: #2c3e50; }
        .menu-card h3 { color: #2c3e50; margin-bottom: 10px; }
        
        /* Hide elements by default, reveal based on role */
        .admin-only, .store-only { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>University Inventory System</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="container">
        <div class="welcome-card">
            <h2 id="welcomeText">Loading...</h2>
            <p><strong>Role:</strong> <span id="roleText"></span></p>
        </div>

        <div class="menu-grid">
            
            <div class="menu-card admin-only store-only" onclick="window.location.href='receive.html'">
                <h3>📦 Receive New Items (QR)</h3>
                <p>Generate QR codes and add new inventory to the store.</p>
            </div>

            <div class="menu-card admin-only store-only" onclick="window.location.href='issue.html'">
                <h3>📤 Issue / Scan Item</h3>
                <p>Scan a QR code to issue an item or view its current status.</p>
            </div>

            <div class="menu-card" onclick="window.location.href='search.html'">
                <h3>🔍 Search & Clearance</h3>
                <p>Search by Employee ID to view assigned assets.</p>
            </div>

        </div>
    </div>

    <script>
        // 1. Check if user is logged in
        const userSession = sessionStorage.getItem("currentUser");
        
        if (!userSession) {
            // If no session data exists, kick them back to login
            window.location.href = "index.html";
        } else {
            // 2. Parse the user data and update UI
            const user = JSON.parse(userSession);
            document.getElementById("welcomeText").innerText = "Welcome, " + user.username + "!";
            document.getElementById("roleText").innerText = user.role;

            // 3. Simple Role-Based Access Control (RBAC) on the frontend
            if (user.role === "SuperAdmin" || user.role === "StoreAdmin") {
                document.querySelectorAll('.store-only').forEach(el => el.style.display = 'block');
            }
            if (user.role === "SuperAdmin") {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            }
        }

        // 4. Logout function
        function logout() {
            sessionStorage.removeItem("currentUser");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
