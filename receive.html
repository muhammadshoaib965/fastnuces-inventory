<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receive Items & Generate QR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #2c3e50; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px; }
        button:hover { background-color: #1a252f; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        .back-btn { background-color: #7f8c8d; margin-bottom: 20px; width: auto; }
        
        #message { margin-top: 15px; font-weight: bold; text-align: center; }

        /* Custom Category Box */
        #customCategoryDiv { display: none; background-color: #e8f4f8; padding: 15px; border-radius: 4px; margin-bottom: 15px; border: 1px solid #bce8f1; }

        /* QR Code Display Grid */
        #qrContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; margin-top: 30px; }
        .qr-card { text-align: center; border: 1px dashed #ccc; padding: 15px; background: #fff; }
        .qr-card p { margin-top: 10px; font-weight: bold; font-size: 14px; margin-bottom: 0; }

        #printBtn { background-color: #27ae60; display: none; margin-top: 20px; }
        #printBtn:hover { background-color: #2ecc71; }

        @media print {
            body { background-color: white; padding: 0; }
            .no-print { display: none !important; }
            .container { box-shadow: none; padding: 0; }
            #qrContainer { display: flex; flex-wrap: wrap; justify-content: flex-start; gap: 10px; }
            .qr-card { border: 1px solid #000; width: 120px; padding: 10px; margin-bottom: 10px; page-break-inside: avoid; }
        }
    </style>
</head>
<body>

    <button class="back-btn no-print" onclick="window.location.href='dashboard.html'">← Back to Dashboard</button>

    <div class="container">
        <h2 class="no-print">Receive New Items</h2>
        
        <form id="receiveForm" class="no-print">
            <div class="form-group">
                <label for="itemSelect">Item Category</label>
                <select id="itemSelect" required>
                    <option value="">-- Select Item --</option>
                    <option value="Tea Table|TBL-TEA">Tea Table (TBL-TEA)</option>
                    <option value="Office Table|TBL-OFF">Office Table (TBL-OFF)</option>
                    <option value="Small Table|TBL-SML">Small Table (TBL-SML)</option>
                    <option value="Office Chair|CHR-OFF">Office Chair (CHR-OFF)</option>
                    <option value="Sofa Seat|SFA-SET">Sofa Seat (SFA-SET)</option>
                    <option value="Projector|PRJ-CTR">Projector (PRJ-CTR)</option>
                    <option value="custom" style="font-weight: bold; color: blue;">➕ Add New Category...</option>
                </select>
            </div>

            <div id="customCategoryDiv">
                <div class="form-group">
                    <label for="customCatName">New Category Name</label>
                    <input type="text" id="customCatName" placeholder="e.g., Water Dispenser">
                </div>
                <div class="form-group">
                    <label for="customPrefix">New Prefix</label>
                    <input type="text" id="customPrefix" placeholder="e.g., WTR-DSPR" style="text-transform: uppercase;">
                </div>
            </div>

            <div class="form-group">
                <label for="quantity">Quantity Received</label>
                <input type="number" id="quantity" min="1" max="100" placeholder="e.g., 5" required>
            </div>

            <button type="submit" id="generateBtn">Add to Inventory & Generate QR Codes</button>
        </form>

        <div id="message" class="no-print"></div>
        <button id="printBtn" class="no-print" onclick="window.print()">🖨️ Print QR Code Labels</button>
        <div id="qrContainer"></div>
    </div>

    <script>
        const userSession = sessionStorage.getItem("currentUser");
        if (!userSession) window.location.href = "index.html";
        const user = JSON.parse(userSession);

        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzXWpnrs3-G0kaf5Ky4VahtYONCcpq04mE6s4W-PZlDKhZaSRHl8xULFSxLW9G1eX3n/exec";

        // Logic to show/hide the custom category fields
        document.getElementById('itemSelect').addEventListener('change', function() {
            const customDiv = document.getElementById('customCategoryDiv');
            const customName = document.getElementById('customCatName');
            const customPrefix = document.getElementById('customPrefix');
            
            if (this.value === 'custom') {
                customDiv.style.display = 'block';
                customName.required = true;
                customPrefix.required = true;
            } else {
                customDiv.style.display = 'none';
                customName.required = false;
                customPrefix.required = false;
            }
        });

        document.getElementById('receiveForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const itemSelect = document.getElementById('itemSelect').value;
            const quantity = parseInt(document.getElementById('quantity').value);
            const messageDiv = document.getElementById('message');
            const btn = document.getElementById('generateBtn');
            const qrContainer = document.getElementById('qrContainer');
            const printBtn = document.getElementById('printBtn');

            let category, prefix;

            // Check if user is using the custom input or a preset dropdown value
            if (itemSelect === 'custom') {
                category = document.getElementById('customCatName').value;
                // Force prefix to be uppercase and remove accidental spaces
                prefix = document.getElementById('customPrefix').value.toUpperCase().replace(/\s+/g, '-');
            } else {
                [category, prefix] = itemSelect.split("|");
            }

            messageDiv.innerText = "Processing and connecting to database...";
            messageDiv.style.color = "blue";
            btn.disabled = true;
            qrContainer.innerHTML = ""; 
            printBtn.style.display = "none";

            const payload = {
                action: "receiveItems",
                category: category,
                prefix: prefix,
                quantity: quantity,
                userId: user.userId 
            };

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify(payload),
                    headers: { "Content-Type": "text/plain;charset=utf-8" }
                });
                
                const result = await response.json();

                if (result.success) {
                    messageDiv.style.color = "green";
                    messageDiv.innerText = result.message;
                    
                    result.data.forEach(item => {
                        const card = document.createElement("div");
                        card.className = "qr-card";
                        
                        const qrDiv = document.createElement("div");
                        new QRCode(qrDiv, { text: item.qrLink, width: 100, height: 100, correctLevel : QRCode.CorrectLevel.H });

                        const tagText = document.createElement("p");
                        tagText.innerText = item.tag;

                        card.appendChild(qrDiv);
                        card.appendChild(tagText);
                        qrContainer.appendChild(card);
                    });

                    printBtn.style.display = "block";
                    btn.disabled = false;
                    document.getElementById('receiveForm').reset();
                    document.getElementById('customCategoryDiv').style.display = 'none';

                } else {
                    messageDiv.style.color = "red";
                    messageDiv.innerText = "Error: " + result.message;
                    btn.disabled = false;
                }
            } catch (error) {
                messageDiv.style.color = "red";
                messageDiv.innerText = "Network Error. Check console.";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
