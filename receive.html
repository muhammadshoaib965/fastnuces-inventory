<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receive Items & Generate QR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #2c3e50; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px; }
        button:hover { background-color: #1a252f; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        .back-btn { background-color: #7f8c8d; margin-bottom: 20px; width: auto; }
        
        #message { margin-top: 15px; font-weight: bold; text-align: center; }
        #customPrefixDiv { display: none; background-color: #e8f4f8; padding: 15px; border-radius: 4px; margin-bottom: 15px; border: 1px solid #bce8f1; }

        /* PERFECTLY ALIGNED QR CARDS */
        #qrContainer { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 30px; justify-content: center; }
        .qr-card { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            border: 1px dashed #ccc; 
            padding: 10px; 
            background: #fff; 
            width: 100px; 
        }
        .qr-card p { 
            margin-top: 4px; /* Reduced space between QR and text */
            font-weight: bold; 
            font-size: 11px; /* Smaller font size */
            margin-bottom: 0; 
            text-align: center; 
        }

        #printBtn { background-color: #27ae60; display: none; margin-top: 20px; }
        #printBtn:hover { background-color: #2ecc71; }

        @media print {
            body { background-color: white; padding: 0; }
            .no-print { display: none !important; }
            .container { box-shadow: none; padding: 0; }
            #qrContainer { display: flex; flex-wrap: wrap; justify-content: flex-start; gap: 10px; }
            .qr-card { border: 1px solid #000; width: 90px; padding: 8px; margin-bottom: 10px; page-break-inside: avoid; }
        }
    </style>
</head>
<body>

    <button class="back-btn no-print" onclick="window.location.href='dashboard.html'">← Back to Dashboard</button>

    <div class="container">
        <h2 class="no-print">Receive New Items</h2>
        
        <form id="receiveForm" class="no-print">
            <div class="form-group">
                <label for="itemInput">Search Category (or type a new one)</label>
                <input list="categoryList" id="itemInput" placeholder="Loading categories..." required autocomplete="off" disabled>
                <datalist id="categoryList"></datalist>
            </div>

            <div id="customPrefixDiv">
                <div class="form-group">
                    <label for="customPrefix">Assign Prefix for New Item</label>
                    <input type="text" id="customPrefix" placeholder="e.g., WTR-DSPR" style="text-transform: uppercase;">
                </div>
            </div>

            <div class="form-group">
                <label for="quantity">Quantity Received</label>
                <input type="number" id="quantity" min="1" max="100" placeholder="e.g., 5" required>
            </div>

            <button type="submit" id="generateBtn">Add to Inventory & Generate QR Codes</button>
        </form>

        <div id="message" class="no-print"></div>
        <button id="printBtn" class="no-print" onclick="window.print()">🖨️ Print QR Code Labels</button>
        <div id="qrContainer"></div>
    </div>

    <script>
        const userSession = sessionStorage.getItem("currentUser");
        if (!userSession) window.location.href = "index.html";
        const user = JSON.parse(userSession);

        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzXWpnrs3-G0kaf5Ky4VahtYONCcpq04mE6s4W-PZlDKhZaSRHl8xULFSxLW9G1eX3n/exec";

        window.onload = async function() {
            const itemInput = document.getElementById('itemInput');
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "getCategories" }),
                    headers: { "Content-Type": "text/plain;charset=utf-8" }
                });
                const result = await response.json();
                
                if (result.success) {
                    const datalist = document.getElementById("categoryList");
                    result.data.forEach(item => {
                        let option = document.createElement("option");
                        option.value = item;
                        datalist.appendChild(option);
                    });
                    itemInput.placeholder = "Type to search or add new...";
                    itemInput.disabled = false; 
                }
            } catch (error) {
                itemInput.placeholder = "Error loading database.";
            }
        };

        document.getElementById('itemInput').addEventListener('input', function() {
            const val = this.value;
            const prefixDiv = document.getElementById('customPrefixDiv');
            const prefixInput = document.getElementById('customPrefix');
            if (val.length > 0 && !val.includes("|")) {
                prefixDiv.style.display = 'block';
                prefixInput.required = true;
            } else {
                prefixDiv.style.display = 'none';
                prefixInput.required = false;
            }
        });

        document.getElementById('receiveForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const itemInput = document.getElementById('itemInput').value;
            const quantity = parseInt(document.getElementById('quantity').value);
            const messageDiv = document.getElementById('message');
            const btn = document.getElementById('generateBtn');
            const qrContainer = document.getElementById('qrContainer');
            const printBtn = document.getElementById('printBtn');

            let category, prefix;
            if (!itemInput.includes("|")) {
                category = itemInput.trim();
                prefix = document.getElementById('customPrefix').value.toUpperCase().replace(/\s+/g, '-');
            } else {
                let parts = itemInput.split("|");
                category = parts[0].trim();
                prefix = parts[1].trim();
            }

            messageDiv.innerText = "Processing...";
            messageDiv.style.color = "blue";
            btn.disabled = true;
            qrContainer.innerHTML = ""; 
            printBtn.style.display = "none";

            const payload = {
                action: "receiveItems",
                category: category,
                prefix: prefix,
                quantity: quantity,
                userId: user.userId 
            };

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify(payload),
                    headers: { "Content-Type": "text/plain;charset=utf-8" }
                });
                
                const result = await response.json();

                if (result.success) {
                    messageDiv.style.color = "green";
                    messageDiv.innerText = result.message;
                    
                    result.data.forEach(item => {
                        const card = document.createElement("div");
                        card.className = "qr-card";
                        
                        const qrDiv = document.createElement("div");
                        // REDUCED QR CODE SIZE TO 80x80
                        new QRCode(qrDiv, { text: item.qrLink, width: 80, height: 80, correctLevel : QRCode.CorrectLevel.H });

                        const tagText = document.createElement("p");
                        tagText.innerText = item.tag;

                        card.appendChild(qrDiv);
                        card.appendChild(tagText);
                        qrContainer.appendChild(card);
                    });

                    printBtn.style.display = "block";
                    btn.disabled = false;
                    document.getElementById('receiveForm').reset();
                    document.getElementById('customPrefixDiv').style.display = 'none';
                    
                    const refreshBtn = document.createElement("button");
                    refreshBtn.innerText = "🔄 Clear Screen & Receive More Items";
                    refreshBtn.className = "no-print";
                    refreshBtn.style.backgroundColor = "#3498db";
                    refreshBtn.style.marginTop = "20px";
                    refreshBtn.onclick = () => window.location.reload();
                    qrContainer.insertAdjacentElement('afterend', refreshBtn);

                } else {
                    messageDiv.style.color = "red";
                    messageDiv.innerText = "Error: " + result.message;
                    btn.disabled = false;
                }
            } catch (error) {
                messageDiv.style.color = "red";
                messageDiv.innerText = "Network Error.";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
